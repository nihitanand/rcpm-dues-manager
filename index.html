const calcDues = (m,s,period="full") => {
  const c=m.type==="couple";
  const t=s.rate_primary+(c?s.rate_spouse:0)+s.rate_erey*(c?2:1);
  return (period==="H1"||period==="H2")?Math.round(t/2):t;
};
const payStatus = (m,pays,s) => {
  const paid=pays.filter(p=>p.member_sn===m.sn).reduce((a,p)=>a+Number(p.amount||0),0);
  const tot=calcDues(m,s);
  return paid>=tot?"paid":paid>0?"partial":"pending";
};

async function savePDF() {
  showStatus("⏳ Generating PDF... please wait");
  try {
    const canvas = await getCanvas();

    }

        rate_primary:settings.rate_primary,
        rate_spouse: settings.rate_spouse,
        rate_erey:   settings.rate_erey,
        bank:        settings.bank,
        acc_name:    settings.acc_name,
        acc_no:      settings.acc_no,
        ifsc:        settings.ifsc,
        upi:         settings.upi,
        pan:         settings.pan,
        formation:   settings.formation,
        addr1:       settings.addr1,
        addr2:       settings.addr2,
        club_no:     settings.club_no,
        district:    settings.district,
      };

      const resp = await fetch(API_URL, {
        method:  "POST",
        headers: {"Content-Type":"application/json"},
        body:    JSON.stringify(payload),
      });

      if (!resp.ok) throw new Error(`API error: ${resp.status}`);

      // Get PDF blob and open in new tab
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      const win  = window.open(url, "_blank");

      // Revoke URL after a delay
      setTimeout(() => URL.revokeObjectURL(url), 60000);

      setToast({msg:"✅ Invoice PDF ready!", c:"green"});
    } catch(e) {
      console.error(e);
      setToast({msg:"❌ " + e.message, c:"red"});
    }
  };
  const openWA=m=>window.open("https://wa.me/?text="+encodeURIComponent(waMsg(m,settings,payments)),"_blank");
  const openReport=()=>{const w=window.open("","_blank");w.document.write(exportReportHTML(members,payments,settings));w.document.close();};

  const filtered=members.filter(m=>{
    const ns=(m.primary+" "+m.spouse).toLowerCase();
    if(search&&!ns.includes(search.toLowerCase())) return false;
    if(filter==="couple"&&m.type!=="couple") return false;
    if(filter==="single"&&m.type!=="single") return false;
    const st=payStatus(m,payments,settings);
    if(filter==="paid"&&st!=="paid") return false;
    if(filter==="pending"&&st!=="pending") return false;
    if(filter==="partial"&&st!=="partial") return false;
    return true;
  });

  const totalDue=members.reduce((a,m)=>a+calcDues(m,settings),0);
  const totalPaid=payments.reduce((a,p)=>a+Number(p.amount||0),0);
  const paidCnt=members.filter(m=>payStatus(m,payments,settings)==="paid").length;
  const partCnt=members.filter(m=>payStatus(m,payments,settings)==="partial").length;
  const pendCnt=members.filter(m=>payStatus(m,payments,settings)==="pending").length;
  const INP="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-200";

  if(!loaded) return(
    <div className="min-h-screen flex flex-col items-center justify-center gap-3 bg-gray-50">
      <div className="text-5xl animate-bounce">🔵</div>
      <p className="font-bold text-lg" style={{color:NAVY}}>Loading RCPM Dues Manager…</p>
    </div>
  );

  return(
    <div className="min-h-screen bg-gray-50">
      {toast&&<div className={`fixed top-4 right-4 z-50 px-4 py-2.5 rounded-xl text-white text-sm font-bold shadow-xl ${toast.c==="green"?"bg-emerald-500":toast.c==="blue"?"bg-indigo-600":"bg-red-500"}`} style={{maxWidth:"320px"}}>{toast.msg}</div>}
      {confirm&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <div className="text-3xl text-center mb-3">⚠️</div>
            <p className="text-center font-semibold text-gray-700 mb-5">{confirm.msg}</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirm(null)} className="flex-1 py-2.5 bg-gray-100 rounded-xl font-semibold text-sm">Cancel</button>
              <button onClick={confirm.onOk} className="flex-1 py-2.5 bg-red-600 text-white rounded-xl font-semibold text-sm">Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* NAV */}
      <nav className="sticky top-0 z-40 shadow-sm" style={{background:NAVY}}>
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            {view!=="dashboard"&&<button onClick={()=>{setView("dashboard");setSelMember(null);}} className="text-white/70 hover:text-white text-sm">← Back</button>}
            <div>
              <div className="text-white font-black text-base leading-tight">🔵 RCPM Dues Manager</div>
              <div className="text-white/50 text-xs">Rotary Club of Patna Millennium · RY {settings.year}</div>
            </div>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={()=>setView("report")} className="text-white/80 hover:text-white text-xs px-2 py-1 rounded-lg hover:bg-white/10">📊 Report</button>
            <button onClick={()=>setView("settings")} className="text-white/80 hover:text-white text-xs px-2 py-1 rounded-lg hover:bg-white/10">⚙️ Settings</button>
          </div>
        </div>
      </nav>

      {/* DASHBOARD */}
      {view==="dashboard"&&(
        <div className="max-w-6xl mx-auto px-4 py-6">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
            {[
              {l:"Total Due",v:fmt(totalDue),bg:"bg-blue-50",tc:"text-blue-800",bc:"border-blue-200"},
              {l:"Collected",v:fmt(totalPaid),bg:"bg-emerald-50",tc:"text-emerald-700",bc:"border-emerald-200"},
              {l:"Pending",v:fmt(totalDue-totalPaid),bg:"bg-amber-50",tc:"text-amber-700",bc:"border-amber-200"},
              {l:"Members",v:`${paidCnt}/${members.length} paid`,bg:"bg-purple-50",tc:"text-purple-700",bc:"border-purple-200"},
            ].map(s=>(
              <div key={s.l} className={`${s.bg} border ${s.bc} rounded-2xl p-4`}>
                <div className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">{s.l}</div>
                <div className={`text-xl font-black ${s.tc}`}>{s.v}</div>
              </div>
            ))}
          </div>
          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm px-5 py-3 mb-5 flex items-center gap-4">
            <span className="text-xs text-gray-500 whitespace-nowrap">{fmt(totalPaid)} collected</span>
            <div className="flex-1 bg-gray-100 rounded-full h-2.5">
              <div className="h-2.5 rounded-full transition-all" style={{width:`${Math.min(100,(totalPaid/totalDue*100)).toFixed(1)}%`,background:`linear-gradient(90deg,${NAVY},${GOLD})`}}/>
            </div>
            <span className="text-sm font-black whitespace-nowrap" style={{color:NAVY}}>{(totalPaid/totalDue*100).toFixed(1)}%</span>
          </div>
          <div className="flex flex-col md:flex-row gap-3 mb-4 flex-wrap">
            <div className="flex gap-1.5 flex-wrap">
              {[["all",`All (${members.length})`],["paid",`Paid (${paidCnt})`],["partial",`Partial (${partCnt})`],["pending",`Pending (${pendCnt})`],["couple","Couples"],["single","Singles"]].map(([f,l])=>(
                <button key={f} onClick={()=>setFilter(f)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${filter===f?"text-white":"bg-white border border-gray-200 text-gray-500 hover:bg-gray-50"}`}
                  style={{background:filter===f?NAVY:undefined}}>{l}</button>
              ))}
            </div>
            <input placeholder="Search member…" value={search} onChange={e=>setSearch(e.target.value)} className="flex-1 min-w-40 px-3 py-1.5 border border-gray-200 rounded-lg text-sm focus:outline-none"/>
            <button onClick={()=>{setMemForm({primary:"",spouse:"",type:"couple",phone1:"",phone2:""});setModal("addMember");}}
              className="text-white px-4 py-1.5 rounded-lg text-sm font-bold whitespace-nowrap" style={{background:NAVY}}>+ Add Member</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {filtered.map(m=>{
              const st=payStatus(m,payments,settings);
              const tot=calcDues(m,settings);
              const paid=payments.filter(p=>p.member_sn===m.sn).reduce((a,p)=>a+Number(p.amount||0),0);
              const bc=st==="paid"?"status-paid":st==="partial"?"status-partial":"status-pending";
              const bt=st==="paid"?"✓ Paid":st==="partial"?"◑ Partial":"⏳ Pending";

                  <div className="flex justify-between items-start mb-2">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-black text-gray-900 text-sm">{m.primary}</span>
                        <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${bc}`}>{bt}</span>
                      </div>
                      {m.type==="couple"&&<div className="text-xs text-gray-400 mt-0.5">& {m.spouse}</div>}
                    </div>
                    <span className="text-xs px-2 py-0.5 rounded-full font-semibold bg-gray-100 text-gray-500 ml-2 shrink-0">{m.type==="couple"?"👫":"👤"}</span>
                  </div>
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-xs text-gray-400">SN {m.sn} · {invNo(m.sn,settings.year)}</span>
                    <div><span className="font-black text-sm" style={{color:NAVY}}>{fmt(paid)}</span><span className="text-gray-300 text-xs"> / {fmt(tot)}</span></div>
                  </div>
                  {paid>0&&paid<tot&&<div className="w-full bg-gray-100 rounded-full h-1.5 mb-3"><div className="h-1.5 rounded-full" style={{width:`${(paid/tot*100).toFixed(0)}%`,background:NAVY}}/></div>}
                  <div className="flex gap-2 flex-wrap">
                    <button onClick={()=>{setSelMember(m);setView("member");}} className="flex-1 py-1.5 rounded-lg text-xs font-bold text-white" style={{background:NAVY}}>View Details</button>
                    <button onClick={()=>openInvoice(m)} className="py-1.5 px-3 rounded-lg text-xs font-bold border" style={{borderColor:GOLD,color:GOLD}}>📄 Invoice</button>
                    <button onClick={()=>openWA(m)} className="py-1.5 px-3 rounded-lg text-xs font-bold bg-green-100 text-green-700">💬 WA</button>
                  </div>
                </div>
              );
            })}
          </div>
          {filtered.length===0&&<div className="text-center py-16 text-gray-300 font-semibold">No members found</div>}
        </div>
      )}

      {/* MEMBER DETAIL */}
      {view==="member"&&selMember&&(()=>{
        const m=members.find(x=>x.sn===selMember.sn)||selMember;
        const mPays=payments.filter(p=>p.member_sn===m.sn).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const tot=calcDues(m,settings);
        const paid=mPays.reduce((a,p)=>a+Number(p.amount||0),0);
        const bal=tot-paid;
        const c=m.type==="couple";
        return(
          <div className="max-w-2xl mx-auto px-4 py-6">
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-4">
              <div className="flex justify-between items-start mb-3">
                <div>
                  <div className="font-black text-lg text-gray-900">{m.primary}</div>
                  {c&&<div className="text-sm text-gray-500">& {m.spouse}</div>}
                  <div className="text-xs text-gray-400 mt-1">{c?"👫 Couple":"👤 Single"} · SN {m.sn} · {invNo(m.sn,settings.year)}</div>
                  {m.phone1&&<div className="text-xs text-gray-400">📱 {m.phone1}{m.phone2?` · ${m.phone2}`:""}</div>}
                </div>
                <div className="flex gap-2">
                  <button onClick={()=>{setMemForm({primary:m.primary,spouse:m.spouse||"",type:m.type,phone1:m.phone1||"",phone2:m.phone2||""});setEditId(m.sn);setModal("editMember");}} className="text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-600 font-semibold">✏️ Edit</button>
                  <button onClick={()=>deleteMember(m.sn)} className="text-xs px-3 py-1.5 rounded-lg bg-red-50 text-red-500 font-semibold">🗑️</button>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-2 mb-3">
                <div className="bg-blue-50 rounded-xl p-3"><div className="text-xs font-bold text-blue-600 uppercase mb-1">Total Due</div><div className="font-black text-blue-700 text-sm">{fmt(tot)}</div></div>
                <div className="bg-emerald-50 rounded-xl p-3"><div className="text-xs font-bold text-emerald-600 uppercase mb-1">Paid</div><div className="font-black text-emerald-700 text-sm">{fmt(paid)}</div></div>
                <div className={`rounded-xl p-3 ${bal>0?"bg-amber-50":"bg-emerald-50"}`}><div className={`text-xs font-bold uppercase mb-1 ${bal>0?"text-amber-600":"text-emerald-600"}`}>Balance</div><div className={`font-black text-sm ${bal>0?"text-amber-700":"text-emerald-700"}`}>{fmt(Math.abs(bal))}</div></div>
              </div>
              {paid>0&&<div className="w-full bg-gray-100 rounded-full h-2 mb-3"><div className="h-2 rounded-full" style={{width:`${Math.min(100,(paid/tot*100)).toFixed(0)}%`,background:`linear-gradient(90deg,${NAVY},${GOLD})`}}/></div>}
              <div className="flex gap-2 flex-wrap">
                <button onClick={()=>{setPayForm({amount:bal>0?bal:"",mode:"UPI",date:today(),ref:"",period:"full",notes:""});setModal("addPayment");}} className="flex-1 py-2 rounded-xl text-sm font-bold text-white" style={{background:NAVY}}>+ Record Payment</button>
                <button onClick={()=>openInvoice(m)} className="py-2 px-4 rounded-xl text-sm font-bold border" style={{borderColor:GOLD,color:GOLD}}>📄 Invoice</button>
                <button onClick={()=>openWA(m)} className="py-2 px-4 rounded-xl text-sm font-bold bg-green-100 text-green-700">💬 WhatsApp</button>
              </div>
            </div>
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm">
              <div className="px-5 py-4 border-b border-gray-50"><h3 className="font-black text-gray-800">Payment History</h3></div>
              {mPays.length===0
                ?<div className="text-center py-10 text-gray-300 text-sm">No payments recorded yet</div>
                :<div className="divide-y divide-gray-50">
                  {mPays.map(p=>(
                    <div key={p.id} className="px-5 py-3 flex justify-between items-center">
                      <div>
                        <div className="font-semibold text-sm text-gray-800">{fmt(Number(p.amount))}</div>
                        <div className="text-xs text-gray-400">{fmtD(p.date)} · {p.mode}{p.ref?` · Ref: ${p.ref}`:""}{p.period!=="full"?` · ${p.period}`:""}</div>
                        {p.notes&&<div className="text-xs text-gray-400 italic">{p.notes}</div>}
                      </div>
                      <button onClick={()=>deletePayment(p.id)} className="text-gray-200 hover:text-red-500 text-sm ml-2">🗑️</button>
                    </div>
                  ))}
                </div>
              }
            </div>
          </div>
        );
      })()}

      {/* REPORT */}
      {view==="report"&&(
        <div className="max-w-4xl mx-auto px-4 py-6">
          <div className="flex justify-between items-center mb-5 flex-wrap gap-3">
            <div>
              <h1 className="text-2xl font-black text-gray-900">Collection Report</h1>
              <p className="text-sm text-gray-400">Rotary Year {settings.year} · {settings.theme}</p>
            </div>
            <button onClick={openReport} className="text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 shadow-sm" style={{background:NAVY}}>
              📥 Export (PDF / JPEG)
            </button>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
            {[{l:"Total Due",v:fmt(totalDue),c:NAVY},{l:"Collected",v:fmt(totalPaid),c:"#059669"},{l:"Pending",v:fmt(totalDue-totalPaid),c:"#d97706"},{l:"Collection %",v:`${(totalPaid/totalDue*100).toFixed(1)}%`,c:"#7c3aed"}].map(s=>(
              <div key={s.l} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                <div className="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">{s.l}</div>
                <div className="text-xl font-black" style={{color:s.c}}>{s.v}</div>
              </div>
            ))}
          </div>
          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-gray-50 border-b border-gray-100">
                  <tr>{["SN","Member","Type","Total Due","Paid","Balance","Status"].map(h=><th key={h} className="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-gray-400">{h}</th>)}</tr>
                </thead>
                <tbody className="divide-y divide-gray-50">
                  {members.map(m=>{
                    const tot=calcDues(m,settings);
                    const paid=payments.filter(p=>p.member_sn===m.sn).reduce((a,p)=>a+Number(p.amount||0),0);
                    const bal=tot-paid;
                    const st=payStatus(m,payments,settings);
                    return(
                      <tr key={m.sn} className="hover:bg-gray-50">
                        <td className="px-4 py-2.5 text-xs text-gray-400">{m.sn}</td>
                        <td className="px-4 py-2.5"><div className="font-semibold text-gray-800 text-xs">{m.primary}</div>{m.spouse&&<div className="text-xs text-gray-400">& {m.spouse}</div>}</td>
                        <td className="px-4 py-2.5 text-xs text-gray-500">{m.type==="couple"?"Couple":"Single"}</td>
                        <td className="px-4 py-2.5 font-bold text-xs" style={{color:NAVY}}>{fmt(tot)}</td>
                        <td className="px-4 py-2.5 font-bold text-xs text-emerald-700">{fmt(paid)}</td>
                        <td className={`px-4 py-2.5 font-bold text-xs ${bal>0?"text-amber-600":"text-emerald-600"}`}>{fmt(bal)}</td>
                        <td className="px-4 py-2.5"><span className={`text-xs px-2 py-0.5 rounded-full font-bold ${st==="paid"?"status-paid":st==="partial"?"status-partial":"status-pending"}`}>{st==="paid"?"✓ Paid":st==="partial"?"◑ Partial":"⏳ Pending"}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr className="bg-gray-50 font-black text-sm border-t-2 border-gray-200">
                    <td className="px-4 py-3" colSpan={3}>Total ({members.length})</td>
                    <td className="px-4 py-3" style={{color:NAVY}}>{fmt(totalDue)}</td>
                    <td className="px-4 py-3 text-emerald-700">{fmt(totalPaid)}</td>
                    <td className="px-4 py-3 text-amber-600">{fmt(totalDue-totalPaid)}</td>
                    <td className="px-4 py-3 text-xs text-gray-400">{paidCnt} paid · {partCnt} partial · {pendCnt} pending</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* SETTINGS */}
      {view==="settings"&&<SettingsView settings={settings} onSave={saveSettings}/>}

      {/* MODAL: Add Payment */}
      {modal==="addPayment"&&(
        <Modal title="💳 Record Payment" onClose={close}>
          <div className="space-y-3">
            <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Amount (₹) *</label>
              <input type="number" value={payForm.amount} onChange={e=>setPayForm({...payForm,amount:e.target.value})} className={INP} placeholder="0" autoFocus/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Mode</label>
                <select value={payForm.mode} onChange={e=>setPayForm({...payForm,mode:e.target.value})} className={INP}>
                  {["UPI","Cash","Cheque","Bank Transfer"].map(m=><option key={m}>{m}</option>)}</select></div>
              <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Period</label>
                <select value={payForm.period} onChange={e=>setPayForm({...payForm,period:e.target.value})} className={INP}>
                  <option value="full">Full Year</option><option value="H1">H1 (Jul–Dec)</option><option value="H2">H2 (Jan–Jun)</option></select></div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Date</label>
                <input type="date" value={payForm.date} onChange={e=>setPayForm({...payForm,date:e.target.value})} className={INP}/></div>
              <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Reference No.</label>
                <input value={payForm.ref} onChange={e=>setPayForm({...payForm,ref:e.target.value})} className={INP} placeholder="UTR / Cheque No."/></div>
            </div>
            <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Notes</label>
              <input value={payForm.notes} onChange={e=>setPayForm({...payForm,notes:e.target.value})} className={INP} placeholder="Optional…"/></div>
            <div className="flex gap-3 pt-2">
              <button onClick={close} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold">Cancel</button>
              <button onClick={addPayment} disabled={!payForm.amount} className="flex-1 py-2.5 text-white rounded-xl text-sm font-bold disabled:opacity-40" style={{background:NAVY}}>Record Payment</button>
            </div>
          </div>
        </Modal>
      )}

      {(modal==="addMember"||modal==="editMember")&&(
        <Modal title={modal==="addMember"?"➕ Add Member":"✏️ Edit Member"} onClose={close}>
          <div className="space-y-3">
            <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Type</label>
              <div className="flex gap-2">
                {["couple","single"].map(t=>(
                  <button key={t} onClick={()=>setMemForm({...memForm,type:t})}
                    className={`flex-1 py-2 rounded-lg text-sm font-bold border transition-colors ${memForm.type===t?"text-white border-transparent":"bg-white border-gray-200 text-gray-500"}`}
                    style={{background:memForm.type===t?NAVY:undefined}}>{t==="couple"?"👫 Couple":"👤 Single"}</button>
                ))}</div></div>
            <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Primary Name *</label>
              <input value={memForm.primary} onChange={e=>setMemForm({...memForm,primary:e.target.value})} placeholder="Rtn. Full Name" className={INP} autoFocus/></div>
            {memForm.type==="couple"&&<div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Spouse Name</label>
              <input value={memForm.spouse} onChange={e=>setMemForm({...memForm,spouse:e.target.value})} placeholder="Rtn. Full Name" className={INP}/></div>}
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Phone 1</label>
                <input value={memForm.phone1} onChange={e=>setMemForm({...memForm,phone1:e.target.value})} className={INP} placeholder="10-digit"/></div>
              {memForm.type==="couple"&&<div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Phone 2</label>
                <input value={memForm.phone2} onChange={e=>setMemForm({...memForm,phone2:e.target.value})} className={INP} placeholder="10-digit"/></div>}
            </div>
            <div className="flex gap-3 pt-2">
              <button onClick={close} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl text-sm font-bold">Cancel</button>
              <button onClick={modal==="addMember"?addMember:updateMember} disabled={!memForm.primary.trim()} className="flex-1 py-2.5 text-white rounded-xl text-sm font-bold disabled:opacity-40" style={{background:NAVY}}>
                {modal==="addMember"?"Add Member":"Update Member"}</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div className="fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto" style={{background:"rgba(0,0,0,0.6)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md my-6">
        <div className="flex justify-between items-center px-6 pt-5 pb-4 border-b border-gray-100">
          <h2 className="text-base font-black text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-700 text-xl font-bold">✕</button>
        </div>
        <div className="px-6 py-5">{children}</div>
      </div>
    </div>
  );
}

function SettingsView({settings,onSave}){
  const [form,setForm]=useState({...settings});
  const INP="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none";
  const F=({label,k,type="text"})=>(
    <div><label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">{label}</label>
      <input type={type} value={form[k]||""} onChange={e=>setForm({...form,[k]:type==="number"?Number(e.target.value):e.target.value})} className={INP}/></div>
  );
  return(
    <div className="max-w-2xl mx-auto px-4 py-6">
      <h1 className="text-2xl font-black text-gray-900 mb-6">⚙️ Year Settings</h1>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-4">
        <p className="text-xs font-black text-gray-400 uppercase tracking-widest">Rotary Year</p>
        <div className="grid grid-cols-2 gap-3"><F label="Year" k="year"/><F label="Theme" k="theme"/></div>
        <p className="text-xs font-black text-gray-400 uppercase tracking-widest pt-2">Dues Rates (₹)</p>
        <div className="grid grid-cols-3 gap-3"><F label="Primary" k="rate_primary" type="number"/><F label="Spouse" k="rate_spouse" type="number"/><F label="EREY" k="rate_erey" type="number"/></div>
        <p className="text-xs font-black text-gray-400 uppercase tracking-widest pt-2">Office Bearers</p>
        <F label="RI President" k="ri_president"/>
        <F label="Dist. Governor" k="dg"/>
        <F label="Club President" k="president"/>
        <F label="Club Secretary" k="secretary"/>
        <F label="Club Treasurer" k="treasurer"/>
        <p className="text-xs font-black text-gray-400 uppercase tracking-widest pt-2">Bank Details</p>
        <F label="Bank Name" k="bank"/>
        <F label="Account Name" k="acc_name"/>
        <F label="Account No" k="acc_no"/>
        <F label="IFSC Code" k="ifsc"/>
        <F label="UPI ID" k="upi"/>
        <p className="text-xs font-black text-gray-400 uppercase tracking-widest pt-2">Club Info</p>
        <div className="grid grid-cols-2 gap-3"><F label="Club No" k="club_no"/><F label="District" k="district"/><F label="PAN" k="pan"/><F label="Formation" k="formation"/></div>
        <F label="Address Line 1" k="addr1"/>
        <F label="Address Line 2" k="addr2"/>
        <button onClick={()=>onSave(form)} className="w-full py-3 text-white rounded-xl font-black mt-2" style={{background:NAVY}}>💾 Save Settings</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
